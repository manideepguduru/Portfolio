services:
  - type: web
    name: portfolio-backend
    runtime: java
    plan: free
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/portfolio-backend-1.0.0.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DB_HOST
        fromDatabase:
          name: portfolio-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: portfolio-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: portfolio-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: portfolio-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: portfolio-db
          property: password
      - key: PORT
        value: "8080"
      - key: CORS_ALLOWED_ORIGINS
        value: https://portfolio-delta-murex-eomyf8lxd8.vercel.app
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: portfolio-db
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all IPs (for Render services)

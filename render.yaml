services:
  - type: web
    name: portfolio-backend
    runtime: java
    plan: free
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: java -jar backend/target/portfolio-backend-1.0.0.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: ${DATABASE_URL}
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: portfolio-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: portfolio-db
          property: password
      - key: PORT
        value: "8080"

  - type: web
    name: portfolio-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://portfolio-backend.onrender.com/api

databases:
  - name: portfolio-db
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: Allow all IPs (for Render services)

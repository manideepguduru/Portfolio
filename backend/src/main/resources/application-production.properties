server.port=${PORT:8080}

# Database - Constructed from individual Render DB properties
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=5

# JPA/Hibernate - use 'update' so tables are auto-created
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CORS Configuration for Vercel frontend (must match CorsConfig key)
portfolio.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Logging
logging.level.root=INFO
logging.level.com.portfolio=INFO

# JWT Secret
app.jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
app.jwt.expiration=86400000

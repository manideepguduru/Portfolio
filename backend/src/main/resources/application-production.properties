server.port=${PORT:8080}

# Database - Use environment variable for production
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=5

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server context
server.servlet.context-path=/api

# CORS Configuration for Vercel frontend
server.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Logging
logging.level.root=INFO
logging.level.com.portfolio=INFO

# JWT Secret
app.jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
app.jwt.expiration=86400000

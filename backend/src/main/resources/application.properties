# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── MySQL DataSource ─────────────────────────────────────────
# Update username/password to match your local MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# validate = checks schema matches entities; change to update during first run if needed
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── CORS ─────────────────────────────────────────────────────
portfolio.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ── Logging ──────────────────────────────────────────────────
logging.level.com.portfolio=INFO

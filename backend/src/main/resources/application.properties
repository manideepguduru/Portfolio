# ── Server ───────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL DataSource ────────────────────────────────────
# Production (Render): Uses environment variables
# Local Development: Uncomment and adjust for local PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/portfolio_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────
# validate = checks schema matches entities; change to update during first run if needed
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── CORS ─────────────────────────────────────────────────────
portfolio.cors.allowed-origins=http://localhost:3000,http://localhost:5173

# ── Logging ──────────────────────────────────────────────────
logging.level.com.portfolio=INFO
